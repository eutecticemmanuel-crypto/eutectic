<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Members - Abious Rehabilitation Initiative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        :root {
            --primary: #0d6e5e;
            --primary-dark: #094a42;
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: rgba(255,255,255,0.08);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.18);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        header p {
            margin: 0;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        .section-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .member-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 18px 44px rgba(0,0,0,0.14);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.72);
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .member-photo {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #e0f7f4, #ccf5ee);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .member-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-photo .placeholder {
            font-size: 60px;
            color: var(--primary);
            opacity: 0.5;
        }

        .member-info {
            padding: 20px;
        }

        .member-name {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .member-role {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .member-biodata {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .member-biodata.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more {
            color: var(--primary);
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .member-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .no-members {
            text-align: center;
            padding: 40px;
            color: #3b4f4a;
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.72);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        .nav-links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            
            .members-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="theme-page">
    <div class="live-wallpaper" aria-hidden="true">
        <div class="theme-orb one"></div>
        <div class="theme-orb two"></div>
        <div class="theme-orb three"></div>
        <div class="theme-particles">
            <span class="theme-particle" style="--size: 8px; --left: 8%; --duration: 19s; --delay: -1s;"></span>
            <span class="theme-particle" style="--size: 12px; --left: 18%; --duration: 25s; --delay: -8s;"></span>
            <span class="theme-particle" style="--size: 10px; --left: 28%; --duration: 21s; --delay: -4s;"></span>
            <span class="theme-particle" style="--size: 7px; --left: 39%; --duration: 24s; --delay: -12s;"></span>
            <span class="theme-particle" style="--size: 12px; --left: 48%; --duration: 20s; --delay: -6s;"></span>
        </div>
    </div>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img data-image-key="members_logo" src="WhatsApp Image 2025-12-03 at 00.15.55.jpeg" alt="Abious Logo" style="width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 3px 10px rgba(0,0,0,0.2);">
            <div>
                <h1>Our Members</h1>
                <p>Meet the amazing people of Abious Rehabilitation Initiative</p>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Community Members</h2>
        
        <div id="membersContainer">
            <div class="loading">Loading members...</div>
        </div>
        
        <div class="nav-links">
            <a href="trial.html">← Back to Home</a>
            <a href="register.html">Join Us</a>
        </div>
    </div>

    <script>
        const API_BASE = (!location.origin || location.origin === 'null' || ['localhost', '127.0.0.1'].includes(location.hostname))
            ? 'http://localhost:3000'
            : '';
        let activeApiBase = API_BASE;

        async function fetchApiJson(path) {
            const response = await fetch(activeApiBase + path);
            if (response.status === 404) throw new Error('API 1 route not found.');
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed.');
            return data;
        }

        async function loadMembers() {
            const container = document.getElementById('membersContainer');
            
            try {
                const data = await fetchApiJson('/api/public/members');
                
                if (!data.members || data.members.length === 0) {
                    container.innerHTML = `
                        <div class="no-members">
                            <p>No members to display yet.</p>
                            <p>Be the first to join!</p>
                            <a href="register.html" style="color: var(--primary);">Register here</a>
                        </div>
                    `;
                    return;
                }
                
                let html = '<div class="members-grid">';
                
                data.members.forEach(member => {
                    const photoHtml = member.photo 
                        ? `<img src="${member.photo}" alt="${member.fullName}">` 
                        : '<div class="placeholder">👤</div>';
                    
                    const biodataHtml = member.biodata 
                        ? `<p class="member-biodata">${member.biodata}</p>` 
                        : '<p class="member-biodata" style="color: #999; font-style: italic;">No bio available</p>';
                    
                    const joinDate = new Date(member.createdAt).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long'
                    });
                    
                    html += `
                        <div class="member-card">
                            <div class="member-photo">
                                ${photoHtml}
                            </div>
                            <div class="member-info">
                                <h3 class="member-name">${member.fullName}</h3>
                                <div class="member-role">${member.role || 'Member'}</div>
                                ${biodataHtml}
                                <div class="member-meta">
                                    <span>Joined: ${joinDate}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading members:', error);
                container.innerHTML = `
                    <div class="no-members">
                        <p>Unable to load members.</p>
                        <p>Check that the backend is running and reachable.</p>
                    </div>
                `;
            }
        }
        
        (async () => {
            try {
                const response = await fetch(activeApiBase + "/api/site-content");
                const data = await response.json();
                const imageAssets = data && data.imageAssets ? data.imageAssets : {};
                document.querySelectorAll("[data-image-key]").forEach((img) => {
                    const key = img.getAttribute("data-image-key");
                    if (key && imageAssets[key]) img.src = imageAssets[key];
                });
            } catch (error) {
                console.warn("Could not load managed site images.", error);
            }
        })();

        // Load members on page load
        loadMembers();
    </script>
</body>
</html>
