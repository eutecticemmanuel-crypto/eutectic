<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Events - Abious Rehabilitation Initiative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        :root {
            --primary: #0d6e5e;
            --primary-dark: #094a42;
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: rgba(255,255,255,0.08);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.18);
        }

        header h1 {
            margin: 0 0 10px 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        .section-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 25px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.68);
            color: var(--primary-dark);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 14px 30px rgba(0,0,0,0.1);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: #e0f7f4;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .news-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 18px 44px rgba(0,0,0,0.14);
            border: 1px solid rgba(255,255,255,0.72);
        }

        .news-card h3 {
            color: var(--primary);
            margin: 0 0 10px 0;
        }

        .news-card .meta {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .news-card .content {
            color: #444;
            line-height: 1.6;
        }

        .event-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 18px 44px rgba(0,0,0,0.14);
            border-left: 5px solid var(--accent);
            border-top: 1px solid rgba(255,255,255,0.72);
            border-right: 1px solid rgba(255,255,255,0.72);
            border-bottom: 1px solid rgba(255,255,255,0.72);
        }

        .event-card h3 {
            color: var(--primary);
            margin: 0 0 10px 0;
        }

        .event-card .event-date {
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .event-card .content {
            color: #444;
            line-height: 1.6;
        }

        .no-content {
            text-align: center;
            padding: 40px;
            color: #666;
            background: white;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        .nav-links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="theme-page">
    <div class="live-wallpaper" aria-hidden="true">
        <div class="theme-orb one"></div>
        <div class="theme-orb two"></div>
        <div class="theme-orb three"></div>
        <div class="theme-particles">
            <span class="theme-particle" style="--size: 8px; --left: 8%; --duration: 19s; --delay: -1s;"></span>
            <span class="theme-particle" style="--size: 12px; --left: 18%; --duration: 25s; --delay: -8s;"></span>
            <span class="theme-particle" style="--size: 10px; --left: 28%; --duration: 21s; --delay: -4s;"></span>
            <span class="theme-particle" style="--size: 7px; --left: 39%; --duration: 24s; --delay: -12s;"></span>
            <span class="theme-particle" style="--size: 12px; --left: 48%; --duration: 20s; --delay: -6s;"></span>
        </div>
    </div>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img data-image-key="news_logo" src="WhatsApp Image 2025-12-03 at 00.15.55.jpeg" alt="Abious Logo" style="width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 3px 10px rgba(0,0,0,0.2);">
            <div>
                <h1>News & Events</h1>
                <p>Stay updated with Abious Rehabilitation Initiative</p>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showTab('news')">📰 News</button>
            <button class="tab" onclick="showTab('events')">📅 Upcoming Events</button>
        </div>

        <div id="newsSection" class="content-section active">
            <h2 class="section-title">Latest News</h2>
            <div id="newsContainer">
                <div class="loading">Loading news...</div>
            </div>
        </div>

        <div id="eventsSection" class="content-section">
            <h2 class="section-title">Upcoming Events</h2>
            <div id="eventsContainer">
                <div class="loading">Loading events...</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="trial.html">← Back to Home</a>
            <a href="members.html">Our Members</a>
        </div>
    </div>

    <script>
        const API_BASE = (!location.origin || location.origin === 'null' || ['localhost', '127.0.0.1'].includes(location.hostname))
            ? 'http://localhost:3000'
            : '';
        let activeApiBase = API_BASE;

        async function fetchApiJson(path) {
            const response = await fetch(activeApiBase + path);
            if (response.status === 404) throw new Error('API 1 route not found.');
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed.');
            return data;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'news') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('newsSection').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('eventsSection').classList.add('active');
            }
        }

        async function loadNews() {
            const container = document.getElementById('newsContainer');
            
            try {
                const data = await fetchApiJson('/api/news');
                
                const newsItems = (data.news || []).filter(n => n.type === 'news');
                
                if (newsItems.length === 0) {
                    container.innerHTML = '<div class="no-content">No news at the moment. Check back later!</div>';
                    return;
                }
                
                let html = '';
                newsItems.forEach(item => {
                    const date = new Date(item.createdAt).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    html += `
                        <div class="news-card">
                            <h3>${item.title}</h3>
                            <div class="meta">Posted on ${date} by ${item.author}</div>
                            <div class="content">${item.content}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading news:', error);
                container.innerHTML = '<div class="no-content">Unable to load news. Please try again later.</div>';
            }
        }

        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            
            try {
                const data = await fetchApiJson('/api/news');
                
                const eventItems = (data.news || []).filter(n => n.type === 'event');
                
                if (eventItems.length === 0) {
                    container.innerHTML = '<div class="no-content">No upcoming events at the moment. Check back later!</div>';
                    return;
                }
                
                let html = '';
                eventItems.forEach(item => {
                    const eventDate = item.eventDate 
                        ? new Date(item.eventDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        })
                        : 'Date TBA';
                    
                    html += `
                        <div class="event-card">
                            <h3>${item.title}</h3>
                            <div class="event-date">📅 ${eventDate}</div>
                            <div class="content">${item.content}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading events:', error);
                container.innerHTML = '<div class="no-content">Unable to load events. Please try again later.</div>';
            }
        }

        (async () => {
            try {
                const response = await fetch(activeApiBase + "/api/site-content");
                const data = await response.json();
                const imageAssets = data && data.imageAssets ? data.imageAssets : {};
                document.querySelectorAll("[data-image-key]").forEach((img) => {
                    const key = img.getAttribute("data-image-key");
                    if (key && imageAssets[key]) img.src = imageAssets[key];
                });
            } catch (error) {
                console.warn("Could not load managed site images.", error);
            }
        })();

        // Load content on page load
        loadNews();
        loadEvents();
    </script>
</body>
</html>
