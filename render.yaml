services:
  - type: web
    name: abious-rehabilitation-center
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "3000"
      - key: HOST
        value: "0.0.0.0"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_EMAIL
        value: "admin@abious.org"
      - key: ADMIN_PASSWORD
        sync: false
      - key: VERIFICATION_TOKEN_SECRET
        sync: false
      - key: SESSION_TTL_MS
        value: "604800000"
      - key: VERIFICATION_SENDER_EMAIL
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_FAMILY
        value: "4"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    plan: free
