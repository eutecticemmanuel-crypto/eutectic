<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Events - Abious Rehabilitation Initiative</title>
    <style>
        :root {
            --primary: #0d6e5e;
            --primary-dark: #094a42;
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f0fdf9 0%, #ecfeff 50%, #f0fdf4 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0 0 10px 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 25px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: #e0f7f4;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .news-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .news-card h3 {
            color: var(--primary);
            margin: 0 0 10px 0;
        }

        .news-card .meta {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .news-card .content {
            color: #444;
            line-height: 1.6;
        }

        .event-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid var(--accent);
        }

        .event-card h3 {
            color: var(--primary);
            margin: 0 0 10px 0;
        }

        .event-card .event-date {
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .event-card .content {
            color: #444;
            line-height: 1.6;
        }

        .no-content {
            text-align: center;
            padding: 40px;
            color: #666;
            background: white;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        .nav-links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>News & Events</h1>
        <p>Stay updated with Abious Rehabilitation Initiative</p>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showTab('news')">📰 News</button>
            <button class="tab" onclick="showTab('events')">📅 Upcoming Events</button>
        </div>

        <div id="newsSection" class="content-section active">
            <h2 class="section-title">Latest News</h2>
            <div id="newsContainer">
                <div class="loading">Loading news...</div>
            </div>
        </div>

        <div id="eventsSection" class="content-section">
            <h2 class="section-title">Upcoming Events</h2>
            <div id="eventsContainer">
                <div class="loading">Loading events...</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="trial.html">← Back to Home</a>
            <a href="members.html">Our Members</a>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'news') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('newsSection').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('eventsSection').classList.add('active');
            }
        }

        async function loadNews() {
            const container = document.getElementById('newsContainer');
            
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                
                const newsItems = (data.news || []).filter(n => n.type === 'news');
                
                if (newsItems.length === 0) {
                    container.innerHTML = '<div class="no-content">No news at the moment. Check back later!</div>';
                    return;
                }
                
                let html = '';
                newsItems.forEach(item => {
                    const date = new Date(item.createdAt).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    html += `
                        <div class="news-card">
                            <h3>${item.title}</h3>
                            <div class="meta">Posted on ${date} by ${item.author}</div>
                            <div class="content">${item.content}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading news:', error);
                container.innerHTML = '<div class="no-content">Unable to load news. Please try again later.</div>';
            }
        }

        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                
                const eventItems = (data.news || []).filter(n => n.type === 'event');
                
                if (eventItems.length === 0) {
                    container.innerHTML = '<div class="no-content">No upcoming events at the moment. Check back later!</div>';
                    return;
                }
                
                let html = '';
                eventItems.forEach(item => {
                    const eventDate = item.eventDate 
                        ? new Date(item.eventDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        })
                        : 'Date TBA';
                    
                    html += `
                        <div class="event-card">
                            <h3>${item.title}</h3>
                            <div class="event-date">📅 ${eventDate}</div>
                            <div class="content">${item.content}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading events:', error);
                container.innerHTML = '<div class="no-content">Unable to load events. Please try again later.</div>';
            }
        }

        // Load content on page load
        loadNews();
        loadEvents();
    </script>
</body>
</html>
