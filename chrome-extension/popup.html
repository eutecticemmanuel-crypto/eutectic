<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abious Foundation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 400px;
            font-family: "Segoe UI", "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #0c4a44 100%);
            color: #ffffff;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 11px;
            opacity: 0.8;
        }

        .content {
            padding: 16px;
        }

        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }

        .link-btn .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 14px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin: 20px 0 10px 0;
            padding-left: 4px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .status-card h3 {
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-card p {
            font-size: 12px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .footer {
            padding: 16px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 11px;
            margin: 0 8px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .version {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 8px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #d97706;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 Abious Foundation</h1>
        <p>Rehabilitation Center Member Hub</p>
    </div>

    <div class="content">
        <div class="quick-links">
            <button class="link-btn" id="btn-home">
                <span class="icon">🏠</span>
                <span>Home Page</span>
            </button>
            <button class="link-btn" id="btn-members">
                <span class="icon">👥</span>
                <span>Member Portal</span>
            </button>
            <button class="link-btn" id="btn-news">
                <span class="icon">📰</span>
                <span>News & Updates</span>
            </button>
            <button class="link-btn" id="btn-register">
                <span class="icon">📝</span>
                <span>Register</span>
            </button>
        </div>

        <div class="section-title">Resources</div>

        <div class="quick-links">
            <button class="link-btn" id="btn-security">
                <span class="icon">🔒</span>
                <span>Security Policy</span>
            </button>
            <button class="link-btn" id="btn-privacy">
                <span class="icon">📜</span>
                <span>Privacy Policy</span>
            </button>
        </div>

        <div class="status-card">
            <h3>📊 Extension Status</h3>
            <p id="status-text">Extension is active and ready to use. Click any link above to navigate to the website.</p>
        </div>
    </div>

    <div class="footer">
        <a href="#" id="link-security">Security</a>
        <a href="#" id="link-privacy">Privacy</a>
        <a href="#" id="link-support">Support</a>
        <div class="version">Version 1.0.0 | Cross-Browser</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
